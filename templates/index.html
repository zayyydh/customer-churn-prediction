{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <h1>🎯 Customer Churn Predictor</h1>
    <p>Fill in the customer details below to predict churn probability</p>
</div>

<div class="form-card">
    <form id="predict-form">

        <div class="form-grid">

            <div class="form-section">
                <h3>👤 Personal Info</h3>
                <div class="form-group"><label>Gender</label>
                    <select name="gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select></div>
                <div class="form-group"><label>Senior Citizen</label>
                    <select name="SeniorCitizen">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Has Partner</label>
                    <select name="Partner">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Has Dependents</label>
                    <select name="Dependents">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
            </div>

            <div class="form-section">
                <h3>📋 Account Info</h3>
                <div class="form-group"><label>Tenure (months)</label>
                    <input type="number" name="tenure" min="0" max="72" value="12"></div>
                <div class="form-group"><label>Monthly Charges ($)</label>
                    <input type="number" name="MonthlyCharges" min="0" max="200" value="65" step="0.01"></div>
                <div class="form-group"><label>Total Charges ($)</label>
                    <input type="number" name="TotalCharges" min="0" value="780" step="0.01"></div>
                <div class="form-group"><label>Paperless Billing</label>
                    <select name="PaperlessBilling">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select></div>
            </div>

            <div class="form-section">
                <h3>📱 Services</h3>
                <div class="form-group"><label>Phone Service</label>
                    <select name="PhoneService">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select></div>
                <div class="form-group"><label>Multiple Lines</label>
                    <select name="MultipleLines_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Internet Service</label>
                    <select id="internet" onchange="updateInternet()">
                        <option value="fiber">Fiber optic</option>
                        <option value="dsl">DSL</option>
                        <option value="no">No</option>
                    </select>
                    <input type="hidden" name="InternetService_Fiber optic" id="fiber_val" value="1">
                    <input type="hidden" name="InternetService_No" id="no_internet_val" value="0">
                </div>
                <div class="form-group"><label>Streaming TV</label>
                    <select name="StreamingTV_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Streaming Movies</label>
                    <select name="StreamingMovies_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
            </div>

            <div class="form-section">
                <h3>🛡️ Security & Support</h3>
                <div class="form-group"><label>Online Security</label>
                    <select name="OnlineSecurity_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Online Backup</label>
                    <select name="OnlineBackup_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Device Protection</label>
                    <select name="DeviceProtection_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Tech Support</label>
                    <select name="TechSupport_Yes">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select></div>
                <div class="form-group"><label>Contract Type</label>
                    <select id="contract" onchange="updateContract()">
                        <option value="month">Month-to-month</option>
                        <option value="one">One year</option>
                        <option value="two">Two year</option>
                    </select>
                    <input type="hidden" name="Contract_One year" id="contract_one" value="0">
                    <input type="hidden" name="Contract_Two year" id="contract_two" value="0">
                </div>
                <div class="form-group"><label>Payment Method</label>
                    <select id="payment" onchange="updatePayment()">
                        <option value="echeck">Electronic check</option>
                        <option value="mcheck">Mailed check</option>
                        <option value="bank">Bank transfer</option>
                        <option value="credit">Credit card</option>
                    </select>
                    <input type="hidden" name="PaymentMethod_Credit card (automatic)" id="pay_credit" value="0">
                    <input type="hidden" name="PaymentMethod_Electronic check" id="pay_echeck" value="1">
                    <input type="hidden" name="PaymentMethod_Mailed check" id="pay_mcheck" value="0">
                </div>
            </div>

        </div>

        <!-- Hidden one-hot fields -->
        <input type="hidden" name="MultipleLines_No phone service" value="0">
        <input type="hidden" name="OnlineSecurity_No internet service" value="0">
        <input type="hidden" name="OnlineBackup_No internet service" value="0">
        <input type="hidden" name="DeviceProtection_No internet service" value="0">
        <input type="hidden" name="TechSupport_No internet service" value="0">
        <input type="hidden" name="StreamingTV_No internet service" value="0">
        <input type="hidden" name="StreamingMovies_No internet service" value="0">

        <button type="button" onclick="predict()" class="predict-btn">
            🔮 Predict Churn
        </button>

    </form>

    <div id="result-box" class="result-box hidden">
        <div id="result-icon" class="result-icon"></div>
        <div id="result-text" class="result-text"></div>
        <div id="result-prob" class="result-prob"></div>
        <div id="gauge-chart" style="width:100%;height:250px;"></div>
    </div>
</div>

<script>
function updateInternet() {
    const val = document.getElementById('internet').value;
    document.getElementById('fiber_val').value       = val === 'fiber' ? 1 : 0;
    document.getElementById('no_internet_val').value = val === 'no'    ? 1 : 0;
}
function updateContract() {
    const val = document.getElementById('contract').value;
    document.getElementById('contract_one').value = val === 'one' ? 1 : 0;
    document.getElementById('contract_two').value = val === 'two' ? 1 : 0;
}
function updatePayment() {
    const val = document.getElementById('payment').value;
    document.getElementById('pay_credit').value  = val === 'credit' ? 1 : 0;
    document.getElementById('pay_echeck').value  = val === 'echeck' ? 1 : 0;
    document.getElementById('pay_mcheck').value  = val === 'mcheck' ? 1 : 0;
}

async function predict() {
    const form   = document.getElementById('predict-form');
    const inputs = form.querySelectorAll('input, select');
    const data   = {};
    inputs.forEach(el => { if (el.name) data[el.name] = el.value; });

    const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    const result = await response.json();

    const box = document.getElementById('result-box');
    box.classList.remove('hidden', 'low', 'medium', 'high');
    const riskClass = result.probability >= 70 ? 'high' : result.probability >= 40 ? 'medium' : 'low';
    box.classList.add(riskClass);

    document.getElementById('result-icon').textContent =
        result.probability >= 70 ? '🚨' : result.probability >= 40 ? '⚠️' : '✅';
    document.getElementById('result-text').textContent = result.risk;
    document.getElementById('result-prob').textContent = `Churn Probability: ${result.probability}%`;

    Plotly.newPlot('gauge-chart', [{
        type: 'indicator', mode: 'gauge+number',
        value: result.probability,
        gauge: {
            axis: { range: [0, 100] },
            bar: { color: riskClass === 'high' ? '#e74c3c' : riskClass === 'medium' ? '#f39c12' : '#2ecc71' },
            steps: [
                { range: [0,  40], color: '#d5f5e3' },
                { range: [40, 70], color: '#fef9e7' },
                { range: [70,100], color: '#fadbd8' }
            ]
        },
        number: { suffix: '%' }
    }], {
        margin: { t:20, b:20, l:40, r:40 },
        paper_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#2c3e50' }
    });
}
</script>

{% endblock %}
